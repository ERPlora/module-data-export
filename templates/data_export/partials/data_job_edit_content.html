{% load djicons i18n %}
<div data-back-url="{% url 'data_export:data_jobs_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Edit Datajob" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'data_export:data_jobs_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="edit-data_job-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="edit-data_job-form"
          hx-post="{% url 'data_export:data_job_edit' obj.id %}">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Name" %}</label>
                <input type="text" name="name" class="input input-sm w-full" value="{{ obj.name }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Job Type" %}</label>
                <input type="text" name="job_type" class="input input-sm w-full" value="{{ obj.job_type }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Entity Type" %}</label>
                <input type="text" name="entity_type" class="input input-sm w-full" value="{{ obj.entity_type }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "File Format" %}</label>
                <input type="text" name="file_format" class="input input-sm w-full" value="{{ obj.file_format }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
                <select name="status" class="select select-sm w-full">
                <option value="">---</option>
                </select>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Records Count" %}</label>
                <input type="number" name="records_count" class="input input-sm w-full" value="{{ obj.records_count }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "File Path" %}</label>
                <input type="text" name="file_path" class="input input-sm w-full" value="{{ obj.file_path }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Error Message" %}</label>
                <textarea name="error_message" class="textarea textarea-sm w-full" rows="3">{{ obj.error_message }}</textarea>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Completed At" %}</label>
                <input type="datetime-local" name="completed_at" class="input input-sm w-full" value="{{ obj.completed_at }}">
                </div>
            </div>
        </div>
    </form>
</div>
