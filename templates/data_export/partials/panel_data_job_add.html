{% load djicons i18n %}

<div class="side-sheet-header">
    <h3 class="sheet-title">{% trans "Add Datajob" %}</h3>
    <button class="sheet-close" @click="closePanel()">{% icon "close-outline" %}</button>
</div>

<div class="side-sheet-content">
    <form id="add-data_job-form"
          hx-post="{% url 'data_export:data_job_add' %}"
          hx-target="#datatable-body"
          hx-swap="innerHTML"
          @htmx:after-request="closePanel()"
          class="flex flex-col gap-4 p-6">
        {% csrf_token %}

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Name" %}</label>
            <input type="text" name="name" class="input input-sm w-full" placeholder="{% trans 'Name' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Job Type" %}</label>
            <input type="text" name="job_type" class="input input-sm w-full" placeholder="{% trans 'Job Type' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Entity Type" %}</label>
            <input type="text" name="entity_type" class="input input-sm w-full" placeholder="{% trans 'Entity Type' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "File Format" %}</label>
            <input type="text" name="file_format" class="input input-sm w-full" placeholder="{% trans 'File Format' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
            <select name="status" class="select select-sm w-full">
                <option value="">{% trans "Select..." %}</option>
            </select>
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Records Count" %}</label>
            <input type="number" name="records_count" class="input input-sm w-full"  placeholder="0">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "File Path" %}</label>
            <input type="text" name="file_path" class="input input-sm w-full" placeholder="{% trans 'File Path' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Error Message" %}</label>
            <textarea name="error_message" class="textarea textarea-sm w-full" rows="3"></textarea>
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Completed At" %}</label>
            <input type="datetime-local" name="completed_at" class="input input-sm w-full">
        </div>
    </form>
</div>

<div class="side-sheet-footer">
    <div class="flex justify-end gap-2">
        <button type="button" class="btn btn-ghost btn-sm" @click="closePanel()">{% trans "Cancel" %}</button>
        <button type="submit" form="add-data_job-form" class="btn btn-sm color-primary">
            {% icon "add-outline" %} {% trans "Add" %}
        </button>
    </div>
</div>
